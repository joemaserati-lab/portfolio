<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Runner Loop</title>
  <link rel="stylesheet" href="styles.css?v=touch-1" />
</head>
<body>
  <main class="stage" aria-label="Animazione uomo in corsa controllata dallo scroll">
    <canvas id="runnerCanvas"></canvas>
    <svg class="hero-type-top" viewBox="0 0 1000 220" preserveAspectRatio="none" aria-hidden="true">
      <text x="0" y="185" textLength="1000" lengthAdjust="spacingAndGlyphs">PORTFOLIO</text>
    </svg>
    <div class="hero-type hero-type-bottom hero-type-bottom-left">EDOARDO</div>
    <div class="hero-type hero-type-bottom hero-type-bottom-right">RAPPANELLO</div>
    <div class="loading" id="loading">Loading sequence</div>
  </main>

  <section class="final-content" id="finalContent" aria-label="Contenuto portfolio placeholder" aria-hidden="true">
    <div class="final-content-inner">
      <p class="final-kicker">Selected Work</p>
      <h1>Placeholder Content</h1>
      <p>Una prima sezione placeholder che introduce il portfolio mentre il runner resta fisso in alto.</p>
    </div>
  </section>

  <script src="script.js?v=touch-2"></script>
</body>
</html>
